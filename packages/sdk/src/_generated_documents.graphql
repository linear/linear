  # [INTERNAL] Sort returned users.
  $sort: [UserSortInput!]
) {
  users(
    after: $after
    before: $before
    filter: $filter
    first: $first
    includeArchived: $includeArchived
    includeDisabled: $includeDisabled
    last: $last
    orderBy: $orderBy
    sort: $sort
  ) {
    ...UserConnection
  }
}
